<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>まちを描く</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --bg:#0a0a0f; --surface2:#1a1a28; --border:rgba(255,255,255,.08);
    --accent:#7c6aff; --accent2:#ff6a9e; --text:#e8e8f0;
    --text-muted:rgba(232,232,240,.45); --road:#c8c0ff; --glow:rgba(124,106,255,.3);
  }
  html,body { width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;overflow:hidden; }
  #canvas { position:fixed;inset:0;width:100%;height:100%; }
  #ui     { position:fixed;inset:0;pointer-events:none;z-index:10; }

  /* ── CENTER PANEL ── */
  #panel {
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:min(420px,92vw);pointer-events:all;transition:opacity .5s,transform .5s;
  }
  #panel.hidden { opacity:0;pointer-events:none;transform:translate(-50%,-60%); }
  .panel-title {
    font-family:'Zen Kaku Gothic New',sans-serif;font-size:clamp(1.4rem,4vw,2rem);
    font-weight:700;text-align:center;letter-spacing:.04em;margin-bottom:.3em;
    background:linear-gradient(135deg,var(--road),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  }
  .panel-sub { text-align:center;color:var(--text-muted);font-size:.82rem;margin-bottom:1.6rem;line-height:1.6; }
  .search-wrap { position:relative; }
  #search {
    width:100%;padding:.85rem 3rem .85rem 1.1rem;
    background:var(--surface2);border:1px solid var(--border);border-radius:12px;
    color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:1rem;
    outline:none;transition:border-color .25s,box-shadow .25s;
  }
  #search:focus { border-color:var(--accent);box-shadow:0 0 0 3px var(--glow); }
  #search::placeholder { color:var(--text-muted); }
  .search-btn {
    position:absolute;right:.6rem;top:50%;transform:translateY(-50%);
    background:none;border:none;cursor:pointer;color:var(--accent);
    font-size:1.3rem;padding:.3rem;line-height:1;transition:color .2s;z-index:5;
  }
  .search-btn:hover { color:var(--accent2); }
  #suggestions {
    position:absolute;top:calc(100% + 6px);left:0;right:0;
    background:var(--surface2);border:1px solid var(--border);border-radius:10px;
    overflow:hidden;z-index:100;max-height:260px;overflow-y:auto;
    box-shadow:0 8px 32px rgba(0,0,0,.5);display:none;
  }
  .suggestion-item {
    padding:.65rem 1rem;cursor:pointer;font-size:.88rem;color:var(--text);
    border-bottom:1px solid var(--border);transition:background .15s;
    display:flex;flex-direction:column;gap:.15rem;
  }
  .suggestion-item:last-child { border-bottom:none; }
  .suggestion-item:hover { background:rgba(124,106,255,.15); }
  .suggestion-name { font-weight:500; }
  .suggestion-detail { font-size:.75rem;color:var(--text-muted); }

  /* ── MINI SEARCH ── */
  #mini-search-wrap {
    position:absolute;top:1rem;left:1rem;
    pointer-events:all;opacity:0;transition:opacity .4s;
  }
  #mini-search-wrap.visible { opacity:1; }
  #mini-search {
    width:220px;padding:.55rem .9rem;
    background:var(--surface2);border:1px solid var(--border);border-radius:10px;
    color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:.85rem;outline:none;
  }
  #mini-search::placeholder { color:var(--text-muted); }
  #mini-suggestions {
    position:absolute;top:calc(100% + 4px);left:0;width:280px;
    background:var(--surface2);border:1px solid var(--border);border-radius:10px;
    overflow:hidden;z-index:200;max-height:220px;overflow-y:auto;
    box-shadow:0 8px 32px rgba(0,0,0,.5);display:none;
  }

  /* ── TOOLBAR ── */
  #toolbar {
    position:absolute;top:1rem;right:1rem;
    display:flex;flex-direction:column;gap:.5rem;
    pointer-events:all;opacity:0;transition:opacity .4s;
    max-width:220px;
  }
  #toolbar.visible { opacity:1; }
  .tool-btn {
    background:var(--surface2);border:1px solid var(--border);border-radius:10px;
    color:var(--text);padding:.55rem .9rem;font-family:'Noto Sans JP',sans-serif;
    font-size:.8rem;cursor:pointer;display:flex;align-items:center;gap:.4rem;
    transition:background .2s,border-color .2s;white-space:nowrap;
  }
  .tool-btn:hover { background:rgba(124,106,255,.2);border-color:var(--accent); }

  /* ── LAYER TOGGLES（複数同時ON可能） ── */
  #layer-section {
    background:var(--surface2);border:1px solid var(--border);
    border-radius:10px;padding:.5rem .6rem;display:flex;flex-direction:column;gap:.3rem;
  }
  .layer-section-title {
    font-size:.7rem;color:var(--text-muted);letter-spacing:.05em;margin-bottom:.1rem;padding:0 .2rem;
  }
  .layer-toggle {
    display:flex;align-items:center;gap:.5rem;
    padding:.35rem .5rem;border-radius:7px;cursor:pointer;
    border:1px solid transparent;transition:all .2s;
    font-size:.78rem;color:var(--text-muted);font-family:'Noto Sans JP',sans-serif;
    background:none;text-align:left;width:100%;
  }
  .layer-toggle:hover { background:rgba(255,255,255,.05);color:var(--text); }
  .layer-toggle.on { color:var(--text); }
  .layer-toggle .toggle-dot {
    width:10px;height:10px;border-radius:50%;border:2px solid currentColor;
    flex-shrink:0;transition:background .2s;
  }
  .layer-toggle.on .toggle-dot { background:currentColor; }
  .layer-toggle[data-layer="traffic"]{ --lc:#444444; }
  .layer-toggle[data-layer="admin"]  { --lc:#ff9d5c; }
  .layer-toggle[data-layer="river"] { --lc:#60b0ff; }
  .layer-toggle[data-layer="elev"]  { --lc:#64ffb4; }
  .layer-toggle[data-layer="land"]  { --lc:#ffd97d; }
  .layer-toggle[data-layer="farm"]  { --lc:#a8d96e; }
  .layer-toggle.on { color:var(--lc);border-color:color-mix(in srgb,var(--lc) 40%,transparent); }

  /* ── COLOR ROW ── */
  #color-row {
    display:flex;gap:.4rem;flex-wrap:wrap;
    background:var(--surface2);border:1px solid var(--border);
    border-radius:10px;padding:.5rem .7rem;
  }
  .swatch {
    width:20px;height:20px;border-radius:50%;cursor:pointer;
    border:2px solid transparent;transition:transform .15s,border-color .15s;
  }
  .swatch:hover { transform:scale(1.2); }
  .swatch.active { border-color:#fff; }

  /* ── LEGENDS ── */
  #legends {
    position:absolute;bottom:1rem;left:1rem;
    display:flex;flex-direction:column;gap:.4rem;align-items:flex-start;
    pointer-events:none;  /* 子要素で上書き */
    max-width:280px;
  }
  .legend-box {
    background:var(--surface2);border:1px solid var(--border);border-radius:10px;
    padding:.45rem .8rem;font-size:.72rem;color:var(--text-muted);
    display:none;align-items:center;gap:.5rem;pointer-events:auto;
  }
  .legend-box.visible { display:flex; }
  #elev-gradient {
    width:100px;height:8px;border-radius:4px;
    background:linear-gradient(to right,#0d1b6e,#1e6b9e,#3db89e,#a8d96e,#f5e642,#e07b20,#c0392b,#f0e6dc);
  }
  #land-legend-items {
    display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;
  }
  .land-legend-item { display:flex;align-items:center;gap:.25rem; }
  .land-legend-dot { width:10px;height:10px;border-radius:2px;flex-shrink:0; }

  /* ── CITY LABEL ── */
  #city-label {
    position:absolute;bottom:3.5rem;left:50%;transform:translateX(-50%);
    font-family:'Zen Kaku Gothic New',sans-serif;font-size:clamp(1.8rem,5vw,3.2rem);
    font-weight:700;letter-spacing:.06em;color:rgba(232,232,240,.1);
    pointer-events:none;white-space:nowrap;opacity:0;transition:opacity .6s;
  }
  #city-label.visible { opacity:1; }

  /* ── INFO ── */
  #info {
    position:absolute;bottom:1rem;right:1rem;
    background:var(--surface2);border:1px solid var(--border);border-radius:10px;
    padding:.6rem .9rem;font-size:.75rem;color:var(--text-muted);line-height:1.8;
    pointer-events:none;opacity:0;transition:opacity .4s;
  }
  #info.visible { opacity:1; }
  #info strong { color:var(--text); }

  /* ── LOADING ── */
  #loading {
    position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:1rem;
    background:rgba(10,10,15,.85);backdrop-filter:blur(6px);
    z-index:50;opacity:0;pointer-events:none;transition:opacity .3s;
  }
  #loading.visible { opacity:1;pointer-events:all; }
  .spinner {
    width:48px;height:48px;border:3px solid var(--border);
    border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-city {
    font-family:'Zen Kaku Gothic New',sans-serif;font-size:1.3rem;
    background:linear-gradient(135deg,var(--road),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  }
  .loading-text { font-size:.9rem;color:var(--text-muted); }
  #loading-progress { width:200px;height:4px;background:var(--border);border-radius:2px;overflow:hidden; }
  #loading-bar { height:100%;width:0%;background:var(--accent);border-radius:2px;transition:width .3s; }

  /* ── TOAST ── */
  #toast {
    position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);
    background:var(--surface2);border:1px solid var(--border);border-radius:20px;
    padding:.5rem 1.2rem;font-size:.82rem;color:var(--text);z-index:200;
    opacity:0;transition:opacity .3s;pointer-events:none;
  }
  #toast.show { opacity:1; }

  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border);border-radius:3px; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-city" id="loading-city"></div>
  <div class="loading-text" id="loading-msg">データを取得中…</div>
  <div id="loading-progress"><div id="loading-bar"></div></div>
</div>

<div id="ui">
  <div id="panel">
    <h1 class="panel-title">まちを描く</h1>
    <p class="panel-sub">まちの名前を入力すると、<br>道路・川・土地のようすが地図になるよ！<br><span style="font-size:.75rem;opacity:.7">※ OpenStreetMap・国土地理院のデータを使用</span></p>
    <div class="search-wrap">
      <input id="search" type="text" placeholder="都市名を入力（名古屋、大阪、Tokyo…）" autocomplete="off" spellcheck="false">
      <button class="search-btn" id="search-go" title="検索">🔍</button>
      <div id="suggestions"></div>
    </div>
  </div>

  <div id="mini-search-wrap">
    <input id="mini-search" type="text" placeholder="別の都市を検索…" autocomplete="off" spellcheck="false">
    <div id="mini-suggestions"></div>
  </div>

  <div id="toolbar">
    <!-- Layer toggles -->
    <div id="layer-section">
      <div class="layer-section-title">レイヤー（複数選択可）</div>
      <button class="layer-toggle on" data-layer="traffic">
        <span class="toggle-dot"></span>🚦 交通
      </button>
      <button class="layer-toggle" data-layer="land">
        <span class="toggle-dot"></span>🏘️ 土地利用
      </button>
      <button class="layer-toggle" data-layer="elev">
        <span class="toggle-dot"></span>🏔️ 標高
      </button>
      <button class="layer-toggle" data-layer="farm">
        <span class="toggle-dot"></span>🌾 農地
      </button>
      <button class="layer-toggle" data-layer="admin">
        <span class="toggle-dot"></span>🗾 行政界
      </button>
      <button class="layer-toggle" data-layer="river">
        <span class="toggle-dot"></span>🌊 河川
      </button>
    </div>
    <div id="color-row"></div>
    <button class="tool-btn" id="btn-download">💾 PNG保存</button>
    <button class="tool-btn" id="btn-reset">🔄 リセット</button>
    <button class="tool-btn" id="btn-bg">🌗 背景切替</button>
  </div>

  <!-- Legends -->
  <div id="legends">
    <div class="legend-box" id="elev-legend">
      <span id="elev-min">0m</span>
      <div id="elev-gradient"></div>
      <span id="elev-max">—m</span>
    </div>
    <div class="legend-box" id="admin-legend">
      🗾 行政界：<div id="admin-legend-items" style="display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;"></div>
    </div>
    <div class="legend-box" id="traffic-legend">
      🚦 交通凡例：<div id="traffic-legend-items"></div>
    </div>
    <div class="legend-box" id="land-legend">
      🏘️ 土地利用：
      <div id="land-legend-items"></div>
    </div>
    <div class="legend-box" id="farm-legend">
      🌾 農地：
      <div id="farm-legend-items"></div>
    </div>
  </div>

  <div id="city-label"></div>

  <div id="info">
    <strong id="info-city">—</strong><br>
    <span id="info-road-line">交通：<strong id="info-roads">—</strong><br></span>
    <span id="info-river-line" style="display:none">河川数：<strong id="info-rivers">—</strong><br></span>
    <span id="info-elev-line"  style="display:none">標高：<strong id="info-elev">—</strong><br></span>
    <span id="info-land-line"  style="display:none">土地利用：<strong id="info-land">—</strong><br></span>
    <span id="info-farm-line"  style="display:none">農地：<strong id="info-farm">—</strong><br></span>
    <span id="info-admin-line" style="display:none">行政界：<strong id="info-admin">—</strong><br></span>
    データ：OpenStreetMap / 国土地理院 / Open-Meteo
  </div>
</div>

<div id="toast"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

// ══════════════════════════════════════════
//  State
// ══════════════════════════════════════════
const state = {
  roads: [], rivers: [], riverPolys: [], elevGrid: null, landPolys: [], farmPolys: [],
  traffic: null,  // {expressway,national,prefecture,other,railway} 分類済み交通データ
  admin: null,    // {pref:[], city:[], town:[]} 行政界
  cityName: '', bb: null,
  zoom: 1, panX: 0, panY: 0,
  dragging: false, dragStart: null,
  lineColor: '#1a1a1a',
  bgDark: false,      // 地図描画時の背景（false=白）
  panelOpen: true,   // 起動画面表示中フラグ
  // 各レイヤーのON/OFF（複数同時可）
  layers: { traffic: true, river: false, elev: false, land: false, farm: false, admin: false },
  // 交通サブレイヤー表示フラグ
  trafficLayers: { expressway:true, national:true, prefecture:true, other:true, railway:true },
  // 行政界サブレイヤー
  adminLayers: { pref:true, city:true, town:true },
};

// ══════════════════════════════════════════
//  土地利用カラーマップ
// ══════════════════════════════════════════
const LAND_COLORS_DARK = {
  residential:   'rgba(180,140,200,0.55)',
  commercial:    'rgba(255,180,80,0.55)',
  industrial:    'rgba(140,140,160,0.55)',
  retail:        'rgba(255,140,120,0.55)',
  farmland:      'rgba(160,210,120,0.45)',
  farm:          'rgba(160,210,120,0.45)',
  forest:        'rgba(40,140,80,0.60)',
  wood:          'rgba(40,140,80,0.60)',
  grass:         'rgba(120,200,100,0.50)',
  meadow:        'rgba(140,210,110,0.45)',
  park:          'rgba(80,190,120,0.55)',
  recreation_ground: 'rgba(100,200,130,0.50)',
  cemetery:      'rgba(160,190,160,0.50)',
  military:      'rgba(200,80,80,0.45)',
  education:     'rgba(100,160,240,0.50)',
  school:        'rgba(100,160,240,0.50)',
  hospital:      'rgba(240,120,140,0.55)',
  water:         'rgba(60,140,220,0.65)',
  reservoir:     'rgba(60,140,220,0.65)',
  quarry:        'rgba(160,130,100,0.55)',
  construction:  'rgba(220,180,80,0.45)',
  allotments:    'rgba(180,220,130,0.45)',
  orchard:       'rgba(160,220,100,0.45)',
  vineyard:      'rgba(200,180,100,0.45)',
  scrub:         'rgba(140,180,100,0.45)',
  heath:         'rgba(180,160,100,0.45)',
  place_of_worship: 'rgba(220,180,255,0.55)',
  religious:     'rgba(220,180,255,0.55)',
  retail:        'rgba(255,150,100,0.55)',
  commercial:    'rgba(255,180,80,0.55)',
  _default:      'rgba(120,120,140,0.30)',
};
const LAND_COLORS_LIGHT = {
  residential:   'rgba(210,180,230,0.55)',
  commercial:    'rgba(255,210,130,0.60)',
  industrial:    'rgba(170,170,185,0.55)',
  retail:        'rgba(255,180,160,0.55)',
  farmland:      'rgba(200,240,160,0.55)',
  farm:          'rgba(200,240,160,0.55)',
  forest:        'rgba(80,180,100,0.55)',
  wood:          'rgba(80,180,100,0.55)',
  grass:         'rgba(160,230,130,0.50)',
  meadow:        'rgba(180,240,150,0.50)',
  park:          'rgba(120,220,160,0.55)',
  recreation_ground: 'rgba(140,230,170,0.50)',
  cemetery:      'rgba(190,210,190,0.55)',
  military:      'rgba(230,100,100,0.45)',
  education:     'rgba(140,190,255,0.55)',
  school:        'rgba(140,190,255,0.55)',
  hospital:      'rgba(255,160,170,0.55)',
  water:         'rgba(100,180,255,0.65)',
  reservoir:     'rgba(100,180,255,0.65)',
  quarry:        'rgba(190,160,130,0.55)',
  construction:  'rgba(250,220,100,0.50)',
  allotments:    'rgba(210,245,160,0.50)',
  orchard:       'rgba(200,250,130,0.50)',
  vineyard:      'rgba(235,215,130,0.50)',
  scrub:         'rgba(180,220,130,0.50)',
  heath:         'rgba(220,200,130,0.50)',
  place_of_worship: 'rgba(200,150,255,0.55)',
  religious:     'rgba(200,150,255,0.55)',
  retail:        'rgba(255,180,140,0.55)',
  commercial:    'rgba(255,210,130,0.55)',
  _default:      'rgba(160,160,175,0.25)',
};

// 凡例用ラベル
const LAND_LABELS = {
  residential:'住宅地', commercial:'商業地', industrial:'工業地',
  retail:'商店街', farmland:'農地', farm:'農地', forest:'森林', wood:'森林',
  grass:'草地', meadow:'草地', park:'公園', recreation_ground:'公園',
  cemetery:'墓地', military:'軍事', education:'教育', school:'学校',
  hospital:'病院', water:'水域', reservoir:'貯水池', quarry:'採石場',
  construction:'建設中', allotments:'市民農園', orchard:'果樹園',
  vineyard:'ブドウ園', scrub:'低木', heath:'荒地',
  place_of_worship:'寺社・教会', religious:'宗教用地',
  retail:'商業施設', commercial:'商業地',
};

// ══════════════════════════════════════════
//  Palette
// ══════════════════════════════════════════
const PALETTES = [
  {label:'黒',color:'#1a1a1a'},{label:'白',color:'#ffffff'},
  {label:'紫光',color:'#c8c0ff'},{label:'金',color:'#ffd97d'},
  {label:'珊瑚',color:'#ff6a9e'},{label:'翡翠',color:'#64ffda'},
  {label:'橙',color:'#ff9d5c'},{label:'青',color:'#60b0ff'},
];
PALETTES.forEach((p,i) => {
  const sw = document.createElement('div');
  sw.className = 'swatch'+(i===0?' active':'');
  sw.style.background = p.color; sw.title = p.label;
  sw.addEventListener('click', () => {
    document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));
    sw.classList.add('active'); state.lineColor = p.color; draw();
  });
  document.getElementById('color-row').appendChild(sw);
});

// ══════════════════════════════════════════
//  Layer toggles
// ══════════════════════════════════════════
document.querySelectorAll('.layer-toggle').forEach(btn => {
  btn.addEventListener('click', () => {
    const layer = btn.dataset.layer;
    const nowOn = !state.layers[layer];
    state.layers[layer] = nowOn;
    btn.classList.toggle('on', nowOn);
    // 初めてONにしたときデータ取得
    if (nowOn && state.bb) {
      if (layer === 'traffic'&& !state.traffic)               fetchTraffic();
      if (layer === 'admin'  && !state.admin)                 fetchAdmin();
      if (layer === 'river'  && state.rivers.length   === 0) fetchAndParseRivers();
      if (layer === 'elev'   && !state.elevGrid)             fetchElevation();
      if (layer === 'land'   && state.landPolys.length === 0) fetchLanduse();
      if (layer === 'farm'   && state.farmPolys.length  === 0) fetchFarm();
    }
    updateInfoPanel();
    updateLegends();
    draw();
  });
});

// ══════════════════════════════════════════
//  Canvas
// ══════════════════════════════════════════
function resize() { canvas.width=innerWidth; canvas.height=innerHeight; draw(); }
window.addEventListener('resize', resize); resize();

function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = state.panelOpen ? '#0a0a0f' : (state.bgDark ? '#0a0a0f' : '#ffffff');
  ctx.fillRect(0,0,W,H);

  const hasData = state.roads.length||state.rivers.length||state.elevGrid||state.landPolys.length;
  if (!hasData) { drawStars(W,H); return; }

  ctx.save();
  ctx.translate(W/2+state.panX, H/2+state.panY);
  ctx.scale(state.zoom, state.zoom);
  ctx.lineCap='round'; ctx.lineJoin='round';

  // 描画順：標高 → 土地利用 → 河川 → 道路
  if (state.layers.elev  && state.elevGrid)           drawElevation();
  if (state.layers.farm  && state.farmPolys.length)   drawFarm();
  if (state.layers.land  && state.landPolys.length)   drawLanduse();
  if (state.layers.river) {
    // 面データ（川幅ポリゴン）
    if (state.riverPolys.length) {
      ctx.shadowBlur=0;
      const rColor=state.bgDark?'rgba(60,140,220,0.75)':'rgba(80,160,240,0.70)';
      ctx.fillStyle=rColor;
      for(const poly of state.riverPolys){
        if(!poly||poly.length<3) continue;
        ctx.beginPath(); ctx.moveTo(poly[0].x,poly[0].y);
        for(let i=1;i<poly.length;i++) ctx.lineTo(poly[i].x,poly[i].y);
        ctx.closePath(); ctx.fill();
      }
    }
    // 線データ（中心線）
    if (state.rivers.length) {
      ctx.strokeStyle=state.bgDark?'#60b0ff':'#2080e0';
      ctx.lineWidth=1.2/state.zoom;
      ctx.shadowColor=state.bgDark?'#60b0ff':'transparent';
      ctx.shadowBlur=state.bgDark?3/state.zoom:0;
      drawLines(state.rivers);
    }
  }
  if (state.layers.traffic && state.traffic) drawTraffic();
  if (state.layers.admin  && state.admin)   drawAdmin();
  ctx.restore();
}

function drawLines(segs) {
  ctx.shadowBlur = state.bgDark ? ctx.shadowBlur : 0;
  for (const seg of segs) {
    if (seg.length<2) continue;
    ctx.beginPath(); ctx.moveTo(seg[0].x,seg[0].y);
    for (let i=1;i<seg.length;i++) ctx.lineTo(seg[i].x,seg[i].y);
    ctx.stroke();
  }
}

// ── 標高ヒートマップ ──
function drawElevation() {
  const g = state.elevGrid;
  const {minE,maxE,rows,cols,cellW,cellH,totalW,totalH} = g;
  const range = maxE-minE||1;
  ctx.shadowBlur = 0;
  for (let r=0;r<rows;r++) {
    for (let c=0;c<cols;c++) {
      const t = (g.data[r][c]-minE)/range;
      const x = c*cellW - totalW/2;
      const y = r*cellH - totalH/2;
      ctx.fillStyle = elevColor(t,state.bgDark);
      ctx.fillRect(x,y,cellW+0.5,cellH+0.5);
    }
  }
}
function elevColor(t,dark) {
  const stops = dark
    ? [[0,[10,27,110]],[.15,[30,107,158]],[.30,[61,184,158]],[.45,[168,217,110]],
       [.60,[245,230,66]],[.75,[224,123,32]],[.90,[192,57,43]],[1,[240,230,220]]]
    : [[0,[170,210,255]],[.15,[120,200,180]],[.30,[90,190,110]],[.45,[190,210,80]],
       [.60,[230,200,60]],[.75,[200,140,60]],[.90,[160,80,40]],[1,[240,235,230]]];
  for (let i=0;i<stops.length-1;i++) {
    const [t0,c0]=stops[i],[t1,c1]=stops[i+1];
    if (t>=t0&&t<=t1) {
      const f=(t-t0)/(t1-t0);
      const r=Math.round(c0[0]+f*(c1[0]-c0[0]));
      const g=Math.round(c0[1]+f*(c1[1]-c0[1]));
      const b=Math.round(c0[2]+f*(c1[2]-c0[2]));
      return `rgba(${r},${g},${b},${dark?0.82:0.72})`;
    }
  }
  return 'rgba(240,230,220,0.8)';
}

// ── 土地利用ポリゴン ──
function drawLanduse() {
  ctx.shadowBlur = 0;
  const cmap = state.bgDark ? LAND_COLORS_DARK : LAND_COLORS_LIGHT;
  for (const poly of state.landPolys) {
    if (!poly.rings || poly.rings.length===0) continue;
    ctx.fillStyle = cmap[poly.type] || cmap._default;
    ctx.beginPath();
    // 外周
    const outer = poly.rings[0];
    if (outer.length<3) continue;
    ctx.moveTo(outer[0].x,outer[0].y);
    for (let i=1;i<outer.length;i++) ctx.lineTo(outer[i].x,outer[i].y);
    ctx.closePath();
    // 内側穴（関係ポリゴン等）
    for (let h=1;h<poly.rings.length;h++) {
      const hole=poly.rings[h];
      ctx.moveTo(hole[0].x,hole[0].y);
      for (let i=1;i<hole.length;i++) ctx.lineTo(hole[i].x,hole[i].y);
      ctx.closePath();
    }
    ctx.fill('evenodd');
  }
}

function drawStars(W,H) {
  ctx.fillStyle='rgba(200,192,255,0.4)';
  for (let i=0;i<120;i++){ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H,Math.random()*1.2,0,Math.PI*2);ctx.fill();}
}

// ══════════════════════════════════════════
//  Projection
// ══════════════════════════════════════════
function project(lat,lon,bb,scale) {
  return {
    x: (lon-bb.minLon)/(bb.maxLon-bb.minLon)*scale - scale/2,
    y:-((lat-bb.minLat)/(bb.maxLat-bb.minLat)*scale - scale/2),
  };
}
function getScale(bb) {
  const dLon=bb.maxLon-bb.minLon, dLat=bb.maxLat-bb.minLat;
  return dLon/dLat>canvas.width/canvas.height ? canvas.width*.88 : canvas.height*.88;
}

function buildLandLegend() {
  const container = document.getElementById('land-legend-items');
  container.innerHTML='';
  const cmap = state.bgDark ? LAND_COLORS_DARK : LAND_COLORS_LIGHT;

  for (const poly of state.landPolys) {
    if (seen.has(poly.type)) continue; seen.add(poly.type);
    const label = LAND_LABELS[poly.type]||poly.type;

}

async function nominatimSearch(q) {
  if (!q.trim()) return [];
  const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&accept-language=ja,en`);
  if (!r.ok) throw new Error('Nominatim HTTP '+r.status);
  return r.json();
}
function renderSuggestions(container,results,onSelect) {
  container.innerHTML='';
  if (!results.length){container.style.display='none';return;}
  results.forEach(item=>{
    const div=document.createElement('div'); div.className='suggestion-item';
    const name=item.display_name.split(',')[0];
    const detail=item.display_name.length>60?item.display_name.slice(0,60)+'…':item.display_name;
    div.innerHTML=`<span class="suggestion-name">${name}</span><span class="suggestion-detail">${detail}</span>`;
    div.addEventListener('click',()=>{container.style.display='none';onSelect(item);});
    container.appendChild(div);
  });
  container.style.display='block';
}

// ══════════════════════════════════════════
//  Overpass fetch
// ══════════════════════════════════════════
async function overpassFetch(query) {
  const r=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:query});
  if(!r.ok) throw new Error('Overpass HTTP '+r.status);
  return r.json();
}

function parseWays(data,bb) {
  const nodes={};
  for(const el of data.elements) if(el.type==='node') nodes[el.id]={lat:el.lat,lon:el.lon};
  const scale=getScale(bb); const segs=[];
  for(const el of data.elements){
    if(el.type!=='way') continue;
    const pts=[];
    for(const nid of el.nodes){const n=nodes[nid];if(n)pts.push(project(n.lat,n.lon,bb,scale));}
    if(pts.length>=2) segs.push(pts);
  }
  return segs;
}

// Overpassから行政界の関係（relation）を取得し、構成wayを結合
async function fetchAdmin() {
  const bb=state.bb; const {minLat:s,minLon:w,maxLat:n,maxLon:e}=bb;
  showLoading(state.cityName,'行政界データを取得中…',10);
  try {
    // 都道府県(4)・市区町村(6/7)・大字(8) を一括取得
    const q=`[out:json][timeout:90];
(
  relation["boundary"="administrative"]["admin_level"="4"](${s},${w},${n},${e});
  relation["boundary"="administrative"]["admin_level"~"6|7"](${s},${w},${n},${e});
  relation["boundary"="administrative"]["admin_level"="8"](${s},${w},${n},${e});
);
(._;>;);out body;`;
    setProgress(20);
    const data = await overpassFetch(q);
    setProgress(70);
    state.admin = parseAdmin(data, bb);
    updateInfoPanel(); updateLegends(); draw();
    toast(`行政界 都道府県${state.admin.pref.length}件 市区町村${state.admin.city.length}件`);
  } catch(err){ toast('行政界エラー: '+err.message, 5000); }
  finally { hideLoading(); }
}

async function fetchAdminSilent(bb) {
  const {minLat:s,minLon:w,maxLat:n,maxLon:e}=bb;
  const q=`[out:json][timeout:90];(relation["boundary"="administrative"]["admin_level"="4"](${s},${w},${n},${e});relation["boundary"="administrative"]["admin_level"~"6|7"](${s},${w},${n},${e});relation["boundary"="administrative"]["admin_level"="8"](${s},${w},${n},${e}););(._;>;);out body;`;
  state.admin = parseAdmin(await overpassFetch(q), bb);
}

function parseAdmin(data, bb) {
  const nodes={}, ways={};
  for(const el of data.elements){
    if(el.type==='node') nodes[el.id]={lat:el.lat,lon:el.lon};
    if(el.type==='way')  ways[el.id]=el.nodes;
  }
  const scale=getScale(bb);
  const result={pref:[], city:[], town:[]};

  for(const el of data.elements){
    if(el.type!=='relation') continue;
    const tags=el.tags||{};
    const level=parseInt(tags.admin_level||'0');
    const cat = level===4?'pref': level<=7?'city':'town';
    // relation の outer member way を結合してポリライン群に
    const lines=[];
    for(const m of (el.members||[])){
      if(m.type!=='way') continue;
      const nodeIds=ways[m.ref];
      if(!nodeIds) continue;
      const pts=[];
      for(const nid of nodeIds){
        const n=nodes[nid];
        if(n) pts.push(project(n.lat,n.lon,bb,scale));
      }
      if(pts.length>=2) lines.push(pts);
    }
    if(lines.length) result[cat].push({name:tags.name||'', lines});
  }
  return result;
}

// 行政界スタイル
const ADMIN_STYLES = {
  pref: { dark:'#ff9d5c', light:'#c04000', width:2.0, dash:[] },
  city: { dark:'#ffd97d', light:'#807000', width:1.0, dash:[] },
  town: { dark:'rgba(200,200,200,0.7)', light:'rgba(100,100,100,0.6)', width:0.5, dash:[4,4] },
};
const ADMIN_LABELS = { pref:'都道府県界', city:'市区町村界', town:'大字・町丁目界' };

function drawAdmin() {
  const al=state.adminLayers;
  const isDark=state.bgDark;
  ctx.shadowBlur=0;
  for(const [cat, style] of Object.entries(ADMIN_STYLES)){
    if(!al[cat]||!state.admin[cat]||!state.admin[cat].length) continue;
    ctx.strokeStyle=isDark?style.dark:style.light;
    ctx.lineWidth=style.width/state.zoom;
    ctx.setLineDash(style.dash.map(d=>d/state.zoom));
    for(const boundary of state.admin[cat]){
      for(const line of boundary.lines){
        if(line.length<2) continue;
        ctx.beginPath(); ctx.moveTo(line[0].x,line[0].y);
        for(let i=1;i<line.length;i++) ctx.lineTo(line[i].x,line[i].y);
        ctx.stroke();
      }
    }
  }
  ctx.setLineDash([]);
}

function buildAdminLegend(){
  const container=document.getElementById('admin-legend-items');
  container.innerHTML='';
  const isDark=state.bgDark;
  for(const [cat,style] of Object.entries(ADMIN_STYLES)){
    if(!state.admin[cat]||!state.admin[cat].length) continue;
    const color=isDark?style.dark:style.light;
    const item=document.createElement('div');
    item.style.cssText='display:flex;align-items:center;gap:3px;cursor:pointer;padding:1px 4px;border-radius:3px;';
    item.style.opacity=state.adminLayers[cat]?'1':'0.4';
    item.innerHTML=`<div style="width:20px;height:2px;background:${color};flex-shrink:0"></div><span style="font-size:.7rem">${ADMIN_LABELS[cat]}</span>`;
    item.addEventListener('click',()=>{

    });
    container.appendChild(item);
  }
}

// ── 交通レイヤー（道路種別・鉄道分類） ──
// highway タグから種別分類
function classifyHighway(tag) {
  if(!tag) return 'other';
  if(['motorway','motorway_link','trunk','trunk_link'].includes(tag)) return 'expressway';
  if(['primary','primary_link'].includes(tag)) return 'national';
  if(['secondary','secondary_link','tertiary','tertiary_link'].includes(tag)) return 'prefecture';
  return 'other';
}

function parseTraffic(data, bb) {
  const nodes={};
  for(const el of data.elements) if(el.type==='node') nodes[el.id]={lat:el.lat,lon:el.lon};
  const scale=getScale(bb);
  const result={expressway:[],national:[],prefecture:[],other:[],railway:[]};
  for(const el of data.elements){
    if(el.type!=='way') continue;
    const pts=[];
    for(const nid of el.nodes){const n=nodes[nid];if(n)pts.push(project(n.lat,n.lon,bb,scale));}
    if(pts.length<2) continue;
    const tags=el.tags||{};
    if(tags.railway){
      result.railway.push(pts);
    } else {
      const cat=classifyHighway(tags.highway);
      result[cat].push(pts);
    }
  }
  return result;
}

async function fetchTraffic() {
  const bb=state.bb; const {minLat:s,minLon:w,maxLat:n,maxLon:e}=bb;
  showLoading(state.cityName,'交通データを取得中…',10);
  try {
    const q=`[out:json][timeout:90];(way["highway"](${s},${w},${n},${e});way["railway"~"rail|subway|tram|light_rail|monorail"](${s},${w},${n},${e}););(._;>;);out body;`;
    setProgress(40);
    const data=await overpassFetch(q);
    setProgress(80);
    state.traffic=parseTraffic(data,bb);
    // 後方互換のため roads も維持
    state.roads=[...state.traffic.expressway,...state.traffic.national,...state.traffic.prefecture,...state.traffic.other];
    updateInfoPanel(); updateLegends(); draw();
    const total=state.roads.length+state.traffic.railway.length;
    toast(`交通データ ${total.toLocaleString()} 本`);
  } catch(err){toast('交通エラー: '+err.message,5000);}
  finally{hideLoading();}
}

async function fetchTrafficSilent(bb) {
  const {minLat:s,minLon:w,maxLat:n,maxLon:e}=bb;
  const q=`[out:json][timeout:90];(way["highway"](${s},${w},${n},${e});way["railway"~"rail|subway|tram|light_rail|monorail"](${s},${w},${n},${e}););(._;>;);out body;`;
  state.traffic=parseTraffic(await overpassFetch(q),bb);
  state.roads=[...state.traffic.expressway,...state.traffic.national,...state.traffic.prefecture,...state.traffic.other];
}

// 交通レイヤー描画
const TRAFFIC_STYLES = {
  expressway: { dark:'#ff6060', light:'#e00000', width:2.8 },
  national:   { dark:'#ffb040', light:'#d06000', width:1.8 },
  prefecture: { dark:'#ffe060', light:'#909000', width:1.2 },
  other:      { dark:'#c0c0c0', light:'#606060', width:0.7 },
  railway:    { dark:'#80e0ff', light:'#0060c0', width:1.6, dash:true },
};

function drawTraffic() {
  const tl=state.trafficLayers;
  const isDark=state.bgDark;
  // 描画順：その他→県道→国道→高速→鉄道（上に来るほど重要）
  const order=['other','prefecture','national','expressway','railway'];
  for(const cat of order){
    if(!tl[cat]||!state.traffic[cat]||!state.traffic[cat].length) continue;
    const s=TRAFFIC_STYLES[cat];
    ctx.strokeStyle=isDark?s.dark:s.light;
    ctx.lineWidth=s.width/state.zoom;
    ctx.shadowColor=isDark?(s.dark):'transparent';

// ── 河川 ──
function parseRiverPolys(data, bb) {
  const nodes={}, ways={};
  for(const el of data.elements){
    if(el.type==='node') nodes[el.id]={lat:el.lat,lon:el.lon};
    if(el.type==='way')  ways[el.id]=el.nodes;
  }
  const scale=getScale(bb);
  const polys=[];

  // way ポリゴン（閉じたway）
  for(const el of data.elements){
    if(el.type!=='way') continue;
    if(!el.nodes||el.nodes[0]!==el.nodes[el.nodes.length-1]) continue;
    const pts=[];
    for(const nid of el.nodes){const n=nodes[nid];if(n)pts.push(project(n.lat,n.lon,bb,scale));}
    if(pts.length>=3) polys.push(pts);
  }

  // relation ポリゴン（outer memberのwayを結合）
  for(const el of data.elements){
    if(el.type!=='relation') continue;
    // outer member の way を収集
    const outerWayIds=(el.members||[])
      .filter(m=>m.type==='way'&&(m.role==='outer'||m.role===''))
      .map(m=>m.ref);
    if(!outerWayIds.length) continue;

    // way を端点でつなぎ合わせてリングを構成
    const segments=outerWayIds
      .map(id=>ways[id])
      .filter(Boolean)
      .map(nodeIds=>nodeIds.map(nid=>nodes[nid]).filter(Boolean));

    // セグメントを連結してリングを作る
    const rings=buildRings(segments);
    for(const ring of rings){
      const pts=ring.map(n=>project(n.lat,n.lon,bb,scale));
      if(pts.length>=3) polys.push(pts);
    }
  }
  return polys;
}

// セグメント配列からリング（閉じたパス）を構成
function buildRings(segments){
  if(!segments.length) return [];
  // セグメントをコピー（破壊的操作のため）
  const segs=segments.map(s=>[...s]);
  const rings=[];

  while(segs.length){
    // 最初のセグメントからリング構築を開始
    let ring=[...segs.shift()];
    let changed=true;
    while(changed){
      changed=false;
      const tailNode=ring[ring.length-1];
      for(let i=0;i<segs.length;i++){
        const seg=segs[i];
        if(!seg.length) continue;
        const headMatch = seg[0]&&tailNode&&
          Math.abs(seg[0].lat-tailNode.lat)<1e-7&&Math.abs(seg[0].lon-tailNode.lon)<1e-7;
        const tailMatch = seg[seg.length-1]&&tailNode&&
          Math.abs(seg[seg.length-1].lat-tailNode.lat)<1e-7&&Math.abs(seg[seg.length-1].lon-tailNode.lon)<1e-7;
        if(headMatch){
          ring=ring.concat(seg.slice(1));
          segs.splice(i,1); changed=true; break;
        } else if(tailMatch){
          ring=ring.concat([...seg].reverse().slice(1));
          segs.splice(i,1); changed=true; break;
        }
      }
    }
    if(ring.length>=3) rings.push(ring);
  }
  return rings;
}

function parseLandPolys(data,bb) {
  const nodes={};
  for(const el of data.elements) if(el.type==='node') nodes[el.id]={lat:el.lat,lon:el.lon};
  const scale=getScale(bb); const polys=[];
  for(const el of data.elements){
    if(el.type!=='way') continue;
    const pts=[];
    for(const nid of el.nodes){const n=nodes[nid];if(n)pts.push(project(n.lat,n.lon,bb,scale));}
    if(pts.length<3) continue;
    // 閉じたwayのみ（ポリゴン）
    const first=el.nodes[0], last=el.nodes[el.nodes.length-1];
    if(first!==last) continue;
    // 土地利用タイプを決定
    const tags=el.tags||{};
    const type=tags.amenity||tags.landuse||tags.natural||tags.leisure||'_default';
    polys.push({type, rings:[pts]});
  }
  return polys;
}

//  標高タイル（国土地理院 DEM10B テキスト / 海外 Open-Meteo）
// ══════════════════════════════════════════

function isJapan(bb) {
  const cLat=(bb.minLat+bb.maxLat)/2, cLon=(bb.minLon+bb.maxLon)/2;
  return cLat>=24&&cLat<=46&&cLon>=122&&cLon<=146;
}

// Web メルカトル タイル座標計算
function latLonToTile(lat,lon,z){
  const x=Math.floor((lon+180)/360*(1<<z));
  const rad=lat*Math.PI/180;
  const y=Math.floor((1-Math.log(Math.tan(rad)+1/Math.cos(rad))/Math.PI)/2*(1<<z));
  return {x,y,z};
}
// タイル左上の緯度経度
function tileToLatLon(x,y,z){
  const n=1<<z;
  const lon=x/n*360-180;
  const latRad=Math.atan(Math.sinh(Math.PI*(1-2*y/n)));
  return {lat:latRad*180/Math.PI, lon};
}

// 国土地理院 DEM テキストタイル 1枚取得 → 256×256 Float32Array
async function fetchGsiDemTile(tx,ty,z,dataset='dem'){
  const url=`https://cyberjapandata.gsi.go.jp/xyz/${dataset}/${z}/${tx}/${ty}.txt`;
  const r=await fetch(url);
  if(!r.ok) return null;
  const text=await r.text();
  const lines=text.trim().split('\n');
  const arr=new Float32Array(256*256);
  for(let row=0;row<256;row++){
    const cols=(lines[row]||'').split(',');
    for(let col=0;col<256;col++){
      const v=cols[col];
      arr[row*256+col]=(v===undefined||v==='e'||v.trim()==='') ? NaN : parseFloat(v);
    }
  }
  return arr;
}

// Open-Meteo グリッド（海外用・100点一括）
async function fetchOpenMeteoGrid(bb,ROWS,COLS){
  const dLat=(bb.maxLat-bb.minLat)/(ROWS-1), dLon=(bb.maxLon-bb.minLon)/(COLS-1);
  const latArr=[],lonArr=[];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    latArr.push((bb.minLat+r*dLat).toFixed(5));
    lonArr.push((bb.minLon+c*dLon).toFixed(5));
  }
  const url=`https://api.open-meteo.com/v1/elevation?latitude=${latArr.join(',')}&longitude=${lonArr.join(',')}`;
  const res=await fetch(url); if(!res.ok) throw new Error('Open-Meteo HTTP '+res.status);
  const flat=(await res.json()).elevation;
  // null補間
  const valid=flat.filter(v=>v!=null&&!isNaN(v));
  const fb=valid.length?valid.reduce((a,b)=>a+b)/valid.length:0;
  const data2d=[];
  for(let r=0;r<ROWS;r++){const row=[];for(let c=0;c<COLS;c++)row.push(flat[r*COLS+c]??fb);data2d.push(row);}
  data2d.reverse();
  const all=data2d.flat();
  return {data:data2d,rows:ROWS,cols:COLS,
          minE:Math.round(Math.min(...all)),maxE:Math.round(Math.max(...all)),
          source:'Open-Meteo',isTile:false};
}

// 国土地理院タイルを複数取得・合成して CanvasGrid を作る
async function fetchGsiTileGrid(bb, onProgress){
  // ズームレベル選択（エリア広さに応じて自動）
  const dLon=bb.maxLon-bb.minLon;
  const z = dLon>2?8 : dLon>1?9 : dLon>0.3?10 : 11;

  const t0=latLonToTile(bb.maxLat,bb.minLon,z); // 左上タイル
  const t1=latLonToTile(bb.minLat,bb.maxLon,z); // 右下タイル
  const txMin=t0.x, txMax=t1.x, tyMin=t0.y, tyMax=t1.y;
  const nTx=txMax-txMin+1, nTy=tyMax-tyMin+1;
  const totalTiles=nTx*nTy;

  // 合成バッファ（全タイル分）
  const BUF_W=nTx*256, BUF_H=nTy*256;
  const buf=new Float32Array(BUF_W*BUF_H).fill(NaN);

  let done=0;
  // 並列数を制限して取得（最大4並列）
  const tiles=[];
  for(let ty=tyMin;ty<=tyMax;ty++) for(let tx=txMin;tx<=txMax;tx++) tiles.push({tx,ty});

  const PARALLEL=4;
  for(let i=0;i<tiles.length;i+=PARALLEL){
    const batch=tiles.slice(i,i+PARALLEL);
    const results=await Promise.all(batch.map(({tx,ty})=>
      fetchGsiDemTile(tx,ty,z,'dem').catch(()=>null)
    ));
    for(let k=0;k<batch.length;k++){
      const {tx,ty}=batch[k];
      const arr=results[k];
      if(!arr) continue;
      const ox=(tx-txMin)*256, oy=(ty-tyMin)*256;
      for(let row=0;row<256;row++) for(let col=0;col<256;col++){
        const v=arr[row*256+col];
        if(!isNaN(v)) buf[(oy+row)*BUF_W+(ox+col)]=v;
      }
    }
    done+=batch.length;
    if(onProgress) onProgress(Math.round(done/totalTiles*75)+10);
  }

  // bboxに対応するピクセル範囲を切り出し
  const tlLatLon=tileToLatLon(txMin,tyMin,z);
  const brLatLon=tileToLatLon(txMax+1,tyMax+1,z);
  // 緯度方向は上→下（北→南）
  const latRange=tlLatLon.lat-brLatLon.lat;
  const lonRange=brLatLon.lon-tlLatLon.lon;

  const pxTop   =Math.floor((tlLatLon.lat-bb.maxLat)/latRange*BUF_H);
  const pxBottom=Math.ceil( (tlLatLon.lat-bb.minLat)/latRange*BUF_H);
  const pxLeft  =Math.floor((bb.minLon-tlLatLon.lon)/lonRange*BUF_W);
  const pxRight =Math.ceil( (bb.maxLon-tlLatLon.lon)/lonRange*BUF_W);

  const cW=Math.max(1,pxRight-pxLeft);
  const cH=Math.max(1,pxBottom-pxTop);

  // 切り出し → 2次元配列（南→北順 = 描画時の上から下）
  const data2d=[];
  let minE=Infinity, maxE=-Infinity;
  const validVals=[];
  // まず valid 値を集める
  for(let py=pxTop;py<pxBottom;py++){
    for(let px=pxLeft;px<pxRight;px++){
      if(py<0||py>=BUF_H||px<0||px>=BUF_W) continue;
      const v=buf[py*BUF_W+px];
      if(!isNaN(v)&&v>-9000) validVals.push(v);
    }
  }
  const fb=validVals.length?validVals.reduce((a,b)=>a+b)/validVals.length:0;
  if(validVals.length){
    minE=Math.round(Math.min(...validVals));
    maxE=Math.round(Math.max(...validVals));
  }

  // 行を逆順（南→北）で格納 → drawElevationが上=北前提なので正順
  for(let py=pxBottom-1;py>=pxTop;py--){
    const row=[];
    for(let px=pxLeft;px<pxRight;px++){
      if(py<0||py>=BUF_H||px<0||px>=BUF_W){ row.push(fb); continue; }
      const v=buf[py*BUF_W+px];
      row.push(isNaN(v)||v<=-9000?fb:v);
    }
    data2d.push(row);
  }

  const scale=getScale(bb);
  return {data:data2d,rows:data2d.length,cols:cW,
          minE,maxE,cellW:scale/cW,cellH:scale/data2d.length,
          totalW:scale,totalH:scale,source:'国土地理院',isTile:true,
          tileCount:totalTiles,zoom:z};
}

  else if(e.touches.length===2&&ltd){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);state.zoom=Math.max(.1,Math.min(50,state.zoom*(d/ltd)));ltd=d;draw();}

//  農地レイヤー
// ══════════════════════════════════════════
const FARM_COLORS_DARK = {
  farmland:            'rgba(168,217,110,0.60)',
  farm:                'rgba(168,217,110,0.60)',
  farmyard:            'rgba(168,217,110,0.55)',
  allotments:          'rgba(168,217,110,0.55)',
  paddy:               'rgba(100,200,160,0.65)',
  orchard:             'rgba(240,220,40,0.70)',
  vineyard:            'rgba(200,180,60,0.65)',
  greenhouse_horticulture: 'rgba(240,140,40,0.70)',
  meadow:              'rgba(140,220,120,0.50)',
  plant_nursery:       'rgba(120,200,100,0.50)',
  _default:            'rgba(150,210,100,0.45)',
};
const FARM_COLORS_LIGHT = {
  farmland:            'rgba(200,240,140,0.65)',
  farm:                'rgba(200,240,140,0.65)',
  farmyard:            'rgba(200,240,140,0.60)',
  allotments:          'rgba(200,240,140,0.60)',
  paddy:               'rgba(140,240,200,0.65)',
  orchard:             'rgba(255,235,0,0.75)',
  vineyard:            'rgba(230,210,60,0.70)',
  greenhouse_horticulture: 'rgba(255,150,30,0.75)',
  meadow:              'rgba(180,250,160,0.55)',
  plant_nursery:       'rgba(160,240,140,0.55)',
  _default:            'rgba(190,245,140,0.50)',
};
const FARM_LABELS = {
  farmland:'農地（畑）', farm:'農地（畑）', farmyard:'農地（農場）',
  allotments:'農地（市民農園）', paddy:'水田',
  orchard:'果樹園', vineyard:'ブドウ園',
  greenhouse_horticulture:'温室栽培', meadow:'牧草地',
  plant_nursery:'苗圃',
};

function drawFarm() {
  ctx.shadowBlur=0;
  const cmap=state.bgDark?FARM_COLORS_DARK:FARM_COLORS_LIGHT;
  for(const poly of state.farmPolys){
    if(!poly.rings||!poly.rings[0]||poly.rings[0].length<3) continue;
    ctx.fillStyle=cmap[poly.type]||cmap._default;
    ctx.beginPath();
    const outer=poly.rings[0];
    ctx.moveTo(outer[0].x,outer[0].y);
    for(let i=1;i<outer.length;i++) ctx.lineTo(outer[i].x,outer[i].y);
    ctx.closePath();
    for(let h=1;h<poly.rings.length;h++){
      const hole=poly.rings[h];
      ctx.moveTo(hole[0].x,hole[0].y);
      for(let i=1;i<hole.length;i++) ctx.lineTo(hole[i].x,hole[i].y);
      ctx.closePath();
    }
    ctx.fill('evenodd');
  }
}

function parseFarmPolys(data,bb){
  const nodes={};
  for(const el of data.elements) if(el.type==='node') nodes[el.id]={lat:el.lat,lon:el.lon};
  const scale=getScale(bb); const polys=[];
  for(const el of data.elements){
    if(el.type!=='way') continue;
    const pts=[];
    for(const nid of el.nodes){const n=nodes[nid];if(n)pts.push(project(n.lat,n.lon,bb,scale));}
    if(pts.length<3) continue;
    if(el.nodes[0]!==el.nodes[el.nodes.length-1]) continue;
    const tags=el.tags||{};
    const type=tags.landuse||'_default';
    polys.push({type,rings:[pts]});
  }
  return polys;
}

const FARM_QUERY_TYPES = 'farmland|farm|farmyard|paddy|orchard|vineyard|allotments|greenhouse_horticulture|meadow|plant_nursery';

async function fetchFarm(){
  const bb=state.bb; const {minLat:s,minLon:w,maxLat:n,maxLon:e}=bb;
  showLoading(state.cityName,'農地データを取得中…',10);
  try{
    const q=`[out:json][timeout:90];way["landuse"~"${FARM_QUERY_TYPES}"](${s},${w},${n},${e});(._;>;);out body;`;
    setProgress(30);
    const data=await overpassFetch(q);
    setProgress(70);
    state.farmPolys=parseFarmPolys(data,bb);
    setProgress(100);
    updateInfoPanel(); updateLegends(); draw();
    toast(`農地 ${state.farmPolys.length.toLocaleString()} 区画`);
  }catch(err){toast('農地エラー: '+err.message,5000);}
  finally{hideLoading();}
}

async function fetchFarmSilent(bb){
  const {minLat:s,minLon:w,maxLat:n,maxLon:e}=bb;
  const q=`[out:json][timeout:90];way["landuse"~"${FARM_QUERY_TYPES}"](${s},${w},${n},${e});(._;>;);out body;`;
  state.farmPolys=parseFarmPolys(await overpassFetch(q),bb);
}

function buildFarmLegend(){
  const container=document.getElementById('farm-legend-items');
  container.innerHTML='';
  const cmap=state.bgDark?FARM_COLORS_DARK:FARM_COLORS_LIGHT;
  const seen=new Set();
  for(const poly of state.farmPolys){
    if(seen.has(poly.type)) continue; seen.add(poly.type);
    const label=FARM_LABELS[poly.type]||poly.type;
    const color=cmap[poly.type]||cmap._default;
    const item=document.createElement('div');
    item.className='land-legend-item';
    item.innerHTML=`<div class="land-legend-dot" style="background:${color}"></div><span>${label}</span>`;
    container.appendChild(item);
    if(seen.size>=6) break;
  }
}

draw();
</script>
